<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>

        <div class="player-inputs">

            <input
                type="text"
                id="player1"
                placeholder="Player 1 Name"
            >

            <input
                type="text"
                id="player2"
                placeholder="Player 2 Name"
            >

        </div>

        <div class="buttons">

            <button id="start-btn">
                Start Game
            </button>

            <button id="restart-btn">
                Restart Game
            </button>

        </div>

        <div id="message">
            Click Start Game
        </div>

        <div id="board"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
